version: '3.8'

services:
  bot:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # КРИТИЧНО ВАЖЛИВО: Базу даних потрібно зберігати за абсолютним шляхом на хості 
      # (/var/lib/tg_bot_data), тому що GitHub Actions runner видаляє локальну папку 
      # під час деплою. Це гарантує збереження даних при оновленні контейнера.
      - /var/lib/tg_bot_data:/app/data
    env_file:
      - .env
